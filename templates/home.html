    <script>
        // Handle the transition from the welcome panel to the spots panel when the "Find Spots" button is clicked
        const findSpotsButton = document.getElementById("findSpotsButton");
        const homeRight = document.querySelector(".home-right");
        const welcomePanel = document.getElementById("welcomePanel");
        const spotsPanel = document.getElementById("spotsPanel");

        findSpotsButton.addEventListener("click", () => {
            welcomePanel.classList.remove("right-panel--active");
            welcomePanel.classList.add("right-panel--hidden");

            spotsPanel.classList.remove("right-panel--hidden");
            spotsPanel.classList.add("right-panel--active");

            homeRight.classList.add("home-right--after");
        });

        // Handle the date sort button icon change when clicked
        const dateSortButton = document.getElementById("dateSortButton");
        const dateSortIcon = document.getElementById("dateSortIcon");

        const iconStates = ["fa-sort", "fa-sort-down", "fa-sort-up"];
        let currentIconIndex = 0;

        dateSortButton.addEventListener("click", () => {
            dateSortIcon.classList.remove(iconStates[currentIconIndex]);
            currentIconIndex = (currentIconIndex + 1) % iconStates.length;
            dateSortIcon.classList.add(iconStates[currentIconIndex]);
        });

        // =========================
        // BOOKMARK POPUP
        // =========================
        const bookmarkPopup = document.getElementById("bookmarkPopup");
        const bookmarkPopupBackdrop = document.getElementById("bookmarkPopupBackdrop");
        const bookmarkSpotName = document.getElementById("bookmarkSpotName");
        const bookmarkSaveButton = document.getElementById("bookmarkSaveButton");
        const bookmarkClearButton = document.getElementById("bookmarkClearButton");
        const bookmarkCollectionInputs = Array.from(document.querySelectorAll(".bookmark-collection__input"));

        let activeBookmarkIcon = null;
        let activeBookmarkButton = null;

        function getSavedCollections(button) {
            const raw = button.dataset.savedCollections;
            return raw ? JSON.parse(raw) : [];
        }

        function setSavedCollections(button, collections) {
            button.dataset.savedCollections = JSON.stringify(collections);
        }

        function getCurrentCollectionLabels() {
            return bookmarkCollectionInputs
                .filter((input) => input.checked)
                .map((input) => input.closest(".bookmark-collection").querySelector(".bookmark-collection__label").textContent.trim());
        }

        function applyCollectionsToPopup(savedCollections) {
            bookmarkCollectionInputs.forEach((input) => {
                const label = input.closest(".bookmark-collection").querySelector(".bookmark-collection__label").textContent.trim();
                input.checked = savedCollections.includes(label);
            });
        }

        function hasSelectedCollections() {
            return bookmarkCollectionInputs.some((input) => input.checked);
        }

        function setBookmarkIconState(icon, isSaved) {
            if (!icon) return;
            icon.classList.toggle("fa-solid", isSaved);
            icon.classList.toggle("fa-regular", !isSaved);
        }

        function openBookmarkPopup(spotName, button, icon) {
            bookmarkSpotName.textContent = spotName;
            activeBookmarkButton = button;
            activeBookmarkIcon = icon;

            const savedCollections = getSavedCollections(button);
            applyCollectionsToPopup(savedCollections);

            bookmarkPopup.hidden = false;
            bookmarkPopupBackdrop.hidden = false;

            requestAnimationFrame(() => {
                bookmarkPopup.classList.add("bookmark-popup--open");
                bookmarkPopupBackdrop.classList.add("bookmark-popup-backdrop--open");
            });

            bookmarkPopup.setAttribute("aria-hidden", "false");
        }

        function closeBookmarkPopup() {
            if (!bookmarkPopup.classList.contains("bookmark-popup--open")) return;

            bookmarkPopup.classList.remove("bookmark-popup--open");
            bookmarkPopupBackdrop.classList.remove("bookmark-popup-backdrop--open");
            bookmarkPopup.setAttribute("aria-hidden", "true");

            window.setTimeout(() => {
                bookmarkPopup.hidden = true;
                bookmarkPopupBackdrop.hidden = true;
                activeBookmarkIcon = null;
                activeBookmarkButton = null;
            }, 220);
        }

        document.querySelectorAll(".spot-bookmark").forEach((button) => {
            const icon = button.querySelector(".fa-bookmark");
            setSavedCollections(button, []);
            setBookmarkIconState(icon, false);

            button.addEventListener("click", (event) => {
                event.stopPropagation();

                const spotCard = button.closest(".spot-card");
                const spotNameElement = spotCard.querySelector(".text-body");
                const spotName = spotNameElement ? spotNameElement.textContent.trim() : "Spot";

                openBookmarkPopup(spotName, button, icon);
            });
        });

        bookmarkPopupBackdrop.addEventListener("click", closeBookmarkPopup);

        bookmarkPopup.addEventListener("click", (event) => {
            event.stopPropagation();
        });

        bookmarkSaveButton.addEventListener("click", () => {
            if (!activeBookmarkButton) return;

            const selectedCollections = getCurrentCollectionLabels();
            setSavedCollections(activeBookmarkButton, selectedCollections);
            setBookmarkIconState(activeBookmarkIcon, selectedCollections.length > 0);
            closeBookmarkPopup();
        });

        bookmarkClearButton.addEventListener("click", () => {
            bookmarkCollectionInputs.forEach((input) => {
                input.checked = false;
            });
        });

        // =========================
        // FILTER POPUP
        // =========================
        const filtersButton = document.getElementById("filtersButton");
        const filterPopup = document.getElementById("filterPopup");
        const filterBackdrop = document.getElementById("filterBackdrop");
        const filterPopupTab = document.getElementById("filterPopupTab");
        const filterApplyButton = document.querySelector(".filter-apply");
        const filterIcons = Array.from(document.querySelectorAll(".filter-icon"));
        const distanceInput = document.getElementById("distanceInput");
        const priceFree = document.getElementById("priceFree");
        const priceButtons = Array.from(document.querySelectorAll(".price-dollar"));

        let filterCloseTimeout = null;

        // Saved filter state
        let appliedFilterIconStates = filterIcons.map((button) => button.classList.contains("filter-icon--active"));
        let appliedDistanceValue = "";
        let appliedPriceOption = "none";

        // Draft filter state
        let draftFilterIconStates = [...appliedFilterIconStates];
        let draftDistanceValue = appliedDistanceValue;
        let draftPriceOption = appliedPriceOption;

        function renderFilterIcons() {
            filterIcons.forEach((button, index) => {
                const isActive = draftFilterIconStates[index];
                button.classList.toggle("filter-icon--active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        function renderPriceSelection() {
            const freeSelected = draftPriceOption === "free";

            priceFree.classList.toggle("price-free--active", freeSelected);
            priceFree.setAttribute("aria-pressed", String(freeSelected));

            priceButtons.forEach((button) => {
                const value = button.dataset.price;
                const isActive = draftPriceOption === value;
                button.classList.toggle("price-dollar--active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        function renderDraftFilters() {
            renderFilterIcons();
            distanceInput.value = draftDistanceValue;
            renderPriceSelection();
        }

        function loadAppliedFiltersIntoDraft() {
            draftFilterIconStates = [...appliedFilterIconStates];
            draftDistanceValue = appliedDistanceValue;
            draftPriceOption = appliedPriceOption;
            renderDraftFilters();
        }

        function saveDraftFiltersAsApplied() {
            appliedFilterIconStates = [...draftFilterIconStates];
            appliedDistanceValue = draftDistanceValue;
            appliedPriceOption = draftPriceOption;
        }

        function openFilterPopup() {
            if (filterCloseTimeout) {
                clearTimeout(filterCloseTimeout);
                filterCloseTimeout = null;
            }

            loadAppliedFiltersIntoDraft();

            filterPopup.hidden = false;
            filterBackdrop.hidden = false;

            requestAnimationFrame(() => {
                filterPopup.classList.add("filter-popup--open");
                filterBackdrop.classList.add("filter-popup-backdrop--open");
            });

            filterPopup.setAttribute("aria-hidden", "false");
            filtersButton.setAttribute("aria-expanded", "true");
        }

        function closeFilterPopup() {
            if (!filterPopup.classList.contains("filter-popup--open")) return;

            filterPopup.classList.remove("filter-popup--open");
            filterBackdrop.classList.remove("filter-popup-backdrop--open");
            filterPopup.setAttribute("aria-hidden", "true");
            filtersButton.setAttribute("aria-expanded", "false");

            filterCloseTimeout = window.setTimeout(() => {
                filterPopup.hidden = true;
                filterBackdrop.hidden = true;
                filterCloseTimeout = null;
            }, 220);
        }

        function toggleFilterPopup() {
            const isOpen = filterPopup.classList.contains("filter-popup--open");
            if (isOpen) {
                closeFilterPopup();
            } else {
                openFilterPopup();
            }
        }

        filtersButton.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleFilterPopup();
        });

        filterPopupTab.addEventListener("click", (event) => {
            event.stopPropagation();
            closeFilterPopup();
        });

        filterApplyButton.addEventListener("click", () => {
            saveDraftFiltersAsApplied();
            closeFilterPopup();
        });

        filterPopupTab.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                closeFilterPopup();
            }
        });

        filterBackdrop.addEventListener("click", closeFilterPopup);

        filterPopup.addEventListener("click", (event) => {
            event.stopPropagation();
        });

        filterIcons.forEach((button, index) => {
            button.addEventListener("click", () => {
                draftFilterIconStates[index] = !draftFilterIconStates[index];
                renderFilterIcons();
            });
        });

        distanceInput.addEventListener("input", () => {
            draftDistanceValue = distanceInput.value;
        });

        priceFree.addEventListener("click", () => {
            draftPriceOption = draftPriceOption === "free" ? "none" : "free";
            renderPriceSelection();
        });

        priceButtons.forEach((button) => {
            button.addEventListener("click", () => {
                const value = button.dataset.price;
                draftPriceOption = draftPriceOption === value ? "none" : value;
                renderPriceSelection();
            });
        });

        renderDraftFilters();

        // =========================
        // ADD SPOT POPUP
        // =========================
        const addSpotButton = document.getElementById("addSpotButton");
        const addSpotPopup = document.getElementById("addSpotPopup");
        const addSpotBackdrop = document.getElementById("addSpotBackdrop");
        const createSpotButton = document.getElementById("createSpotButton");

        const newSpotNameInput = document.getElementById("newSpotName");
        const newSpotCoordinatesInput = document.getElementById("newSpotCoordinates");
        const newSpotDescriptionInput = document.getElementById("newSpotDescription");

        const addSpotPriceFree = document.getElementById("addSpotPriceFree");
        const addSpotPriceButtons = Array.from(document.querySelectorAll("[data-add-spot-price]"));
        const addSpotTagButtons = Array.from(document.querySelectorAll(".add-spot-tag"));

        let addSpotCloseTimeout = null;

        let addSpotDraft = {
            name: "",
            coordinates: "",
            description: "",
            price: "none",
            tags: []
        };

        function renderAddSpotPrice() {
            const freeSelected = addSpotDraft.price === "free";

            addSpotPriceFree.classList.toggle("price-free--active", freeSelected);
            addSpotPriceFree.setAttribute("aria-pressed", String(freeSelected));

            addSpotPriceButtons.forEach((button) => {
                const value = button.dataset.addSpotPrice;
                const isActive = addSpotDraft.price === value;
                button.classList.toggle("price-dollar--active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        function renderAddSpotTags() {
            addSpotTagButtons.forEach((button, index) => {
                const isActive = addSpotDraft.tags.includes(index);
                button.classList.toggle("filter-icon--active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        function renderAddSpotDraft() {
            newSpotNameInput.value = addSpotDraft.name;
            newSpotCoordinatesInput.value = addSpotDraft.coordinates;
            newSpotDescriptionInput.value = addSpotDraft.description;
            renderAddSpotPrice();
            renderAddSpotTags();
        }

        function readAddSpotDraftFromInputs() {
            addSpotDraft.name = newSpotNameInput.value;
            addSpotDraft.coordinates = newSpotCoordinatesInput.value;
            addSpotDraft.description = newSpotDescriptionInput.value;
        }

        function resetAddSpotDraft() {
            addSpotDraft = {
                name: "",
                coordinates: "",
                description: "",
                price: "none",
                tags: []
            };
            renderAddSpotDraft();
        }

        function openAddSpotPopup() {
            if (addSpotCloseTimeout) {
                clearTimeout(addSpotCloseTimeout);
                addSpotCloseTimeout = null;
            }

            renderAddSpotDraft();

            addSpotPopup.hidden = false;
            addSpotBackdrop.hidden = false;

            requestAnimationFrame(() => {
                addSpotPopup.classList.add("add-spot-popup--open");
                addSpotBackdrop.classList.add("add-spot-backdrop--open");
            });

            addSpotPopup.setAttribute("aria-hidden", "false");
        }

        function closeAddSpotPopup({ clearAfterClose = false, saveBeforeClose = false } = {}) {
            if (!addSpotPopup.classList.contains("add-spot-popup--open")) return;

            if (saveBeforeClose) {
                readAddSpotDraftFromInputs();
            }

            addSpotPopup.classList.remove("add-spot-popup--open");
            addSpotBackdrop.classList.remove("add-spot-backdrop--open");
            addSpotPopup.setAttribute("aria-hidden", "true");

            addSpotCloseTimeout = window.setTimeout(() => {
                addSpotPopup.hidden = true;
                addSpotBackdrop.hidden = true;
                addSpotCloseTimeout = null;

                if (clearAfterClose) {
                    resetAddSpotDraft();
                }
            }, 220);
        }

        addSpotButton.addEventListener("click", () => {
            openAddSpotPopup();
        });

        addSpotBackdrop.addEventListener("click", () => {
            closeAddSpotPopup({ saveBeforeClose: true });
        });

        addSpotPopup.addEventListener("click", (event) => {
            event.stopPropagation();
        });

        createSpotButton.addEventListener("click", () => {
            closeAddSpotPopup({ clearAfterClose: true, saveBeforeClose: false });
        });

        newSpotNameInput.addEventListener("input", () => {
            addSpotDraft.name = newSpotNameInput.value;
        });

        newSpotCoordinatesInput.addEventListener("input", () => {
            addSpotDraft.coordinates = newSpotCoordinatesInput.value;
        });

        newSpotDescriptionInput.addEventListener("input", () => {
            addSpotDraft.description = newSpotDescriptionInput.value;
        });

        addSpotPriceFree.addEventListener("click", () => {
            addSpotDraft.price = addSpotDraft.price === "free" ? "none" : "free";
            renderAddSpotPrice();
        });

        addSpotPriceButtons.forEach((button) => {
            button.addEventListener("click", () => {
                const value = button.dataset.addSpotPrice;
                addSpotDraft.price = addSpotDraft.price === value ? "none" : value;
                renderAddSpotPrice();
            });
        });

        addSpotTagButtons.forEach((button, index) => {
            button.addEventListener("click", () => {
                if (addSpotDraft.tags.includes(index)) {
                    addSpotDraft.tags = addSpotDraft.tags.filter((tagIndex) => tagIndex !== index);
                } else {
                    addSpotDraft.tags.push(index);
                }
                renderAddSpotTags();
            });
        });

        // Escape key handler to close popups
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeBookmarkPopup();
                closeFilterPopup();
                closeAddSpotPopup({ saveBeforeClose: true });
            }
        });
    </script>
</body>
