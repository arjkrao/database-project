<!DOCTYPE html>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&family=IBM+Plex+Serif:wght@400&display=swap"
    rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="style.css">

<header class="header">
    <div class="header-inner">
        <div class="logo-group">
            <div class="logo-text">Third</div>
            <div class="logo-text">Spots</div>
        </div>
        <i class="fa-solid fa-circle-user icon-profile"></i>
    </div>
</header>

<body>
    <div class="home-container">
        <div class="home-top-container">
            <div class="home-left">
                <!-- Placeholder image until interactive map is added -->
                <img class="map-placeholder"
                    src="https://t4.ftcdn.net/jpg/02/65/42/55/360_F_265425516_wtAw64cGdOVvrdl64b5bsyBqcD0rkw1W.jpg" />
                <div class="home-left-on-map">
                    <form class="search">
                        <div class="search-group">
                            <button class="search-button" aria-label="Search">
                                <i class="fa-solid fa-magnifying-glass icon-search"></i>
                            </button>
                            <input type="text" placeholder="Search for a Spot..."
                                class="search-input text-primary-dark heading-3">
                        </div>
                    </form>
                    <button class="button button--secondary">Add Spot <i class="fa-solid fa-plus icon-add"></i></button>
                </div>
            </div>
            <div class="home-right">
                <div class="right-panel right-panel--active" id="welcomePanel">
                    <div class="welcome-message">
                        <div class="display-3 text-white">Welcome Back Moderator!</div>
                        <button class="button button--secondary" id="findSpotsButton" type="button">
                            Find Spots <i class="fa-solid fa-location-dot"></i>
                        </button>
                    </div>
                </div>
                <div class="right-panel right-panel--hidden" id="spotsPanel">
                    <div class="spot-buttons">
                        <button class="button button--primary">
                            Filters <i class="fa-solid fa-filter"></i>
                        </button>
                        <button class="button button--primary" id="dateSortButton" type="button">
                            Date <i class="fa-solid fa-sort" id="dateSortIcon"></i>
                        </button>
                    </div>
                    <div class="spots-list">
                        <div class="spot-card">
                            <div class="spot-card-inner">
                                <img class="spot-card-image"
                                    src="https://charlottesville29.com/wp-content/uploads/2012/06/food-0621.jpg" />
                                <div class="spot-info">
                                    <div class="spot-card-top">
                                        <div class="text-body">Bodo's Bagels</div>
                                        <!-- Make Solid on click -->
                                        <button class="spot-bookmark" type="button" aria-label="Toggle bookmark">
                                            <i class="fa-regular fa-bookmark icon-bookmark"></i>
                                        </button>
                                    </div>
                                    <div class="spot-card-middle">
                                        <div class="spot-rating-summary">
                                            <div class="text-small text-gray">3.5</div>
                                            <div class="spot-stars">
                                                <i class="fa-solid fa-star icon-star"></i>
                                                <i class="fa-solid fa-star icon-star"></i>
                                                <i class="fa-solid fa-star icon-star"></i>
                                                <i class="fa-solid fa-star icon-star"></i>
                                                <i class="fa-regular fa-star icon-star"></i>
                                            </div>
                                            <div class="text-small text-gray">(12)</div>
                                        </div>
                                        <div class="text-small text-secondary-dark">FREE</div>
                                    </div>
                                    <div class="spot-card-bottom">
                                        <div class="spot-icons">
                                            <button class="icon-button-base">
                                                <i class="fa-solid fa-utensils"></i>
                                            </button>
                                        </div>
                                        <button class="spot-delete">
                                            <i class="fa-solid fa-trash icon-delete"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <hr class="home-line">
    </div>
    <script>
        // Handle the transition from the welcome panel to the spots panel when the "Find Spots" button is clicked
        const findSpotsButton = document.getElementById("findSpotsButton");
        const homeRight = document.querySelector(".home-right");
        const welcomePanel = document.getElementById("welcomePanel");
        const spotsPanel = document.getElementById("spotsPanel");

        findSpotsButton.addEventListener("click", () => {
            welcomePanel.classList.remove("right-panel--active");
            welcomePanel.classList.add("right-panel--hidden");

            spotsPanel.classList.remove("right-panel--hidden");
            spotsPanel.classList.add("right-panel--active");

            homeRight.classList.add("home-right--after");
        });

        // Handle the date sort button icon change when clicked
        const dateSortButton = document.getElementById("dateSortButton");
        const dateSortIcon = document.getElementById("dateSortIcon");

        const iconStates = ["fa-sort", "fa-sort-down", "fa-sort-up"];
        let currentIconIndex = 0;

        dateSortButton.addEventListener("click", () => {
            dateSortIcon.classList.remove(iconStates[currentIconIndex]);
            currentIconIndex = (currentIconIndex + 1) % iconStates.length;
            dateSortIcon.classList.add(iconStates[currentIconIndex]);
        });

        // Handle the bookmark button toggle between regular and solid on click
        document.querySelectorAll(".spot-bookmark").forEach((button) => {
            const icon = button.querySelector(".fa-bookmark");

            button.addEventListener("click", () => {
                icon.classList.toggle("fa-regular");
                icon.classList.toggle("fa-solid");
            });
        });
    </script>
</body>
