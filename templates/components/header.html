<header class="header">
    <div class="header-inner {% if not show_header_buttons %}header-inner--centered{% endif %}">
        {% if show_header_buttons %}
        <a class="button button--primary" href="{{url_for('logout')}}">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </a>
        {% endif %}
        <a href="{{ url_for('home') if show_header_buttons else '' }}" class="logo-group">
            <div class="logo-text">Third</div>
            <div class="logo-text">Spots</div>
        </a>
        {% if show_header_buttons %}
        <a href="{{ url_for('profile') }}" aria-label="Go to profile">
            <img src="{{url_for('user_profile_image', username=curr_username)}}" class="header-profile-image"></i>
        </a>
        {% endif %}
    </div>
</header>
